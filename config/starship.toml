# =============================================================================
# starship.toml — Starship prompt configuration
# Docs: https://starship.rs/config/
# =============================================================================

# ── Global ────────────────────────────────────────────────────────────────────
command_timeout = 1000
add_newline = true

# Custom format (order of prompt modules)
format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$nodejs\
$python\
$rust\
$golang\
$java\
$docker_context\
$kubernetes\
$cmd_duration\
$line_break\
$jobs\
$status\
$character"""

# ── OS Icon ───────────────────────────────────────────────────────────────────
[os]
disabled = false
style = "bold fg:#89b4fa"

[os.symbols]
Macos = " "
Ubuntu = " "
Debian = " "
Windows = " "
Unknown = " "

# ── Username ─────────────────────────────────────────────────────────────────
[username]
show_always = false                # only show when ssh or root
style_user = "bold fg:#cba6f7"
style_root = "bold fg:#f38ba8"
format = "[$user]($style)"

# ── Hostname ──────────────────────────────────────────────────────────────────
[hostname]
ssh_only = true
style = "bold fg:#94e2d5"
format = "[@$hostname]($style) "

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
style = "bold fg:#89b4fa"
format = "[ $path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "fg:#f38ba8"

[directory.substitutions]
"~" = " ~"
"Documents" = "󰈙 Documents"
"Downloads" = " Downloads"
"Dev" = " Dev"
"Development" = " Development"
".config" = " .config"

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold fg:#f9e2af"
format = "on [$symbol$branch(:$remote_branch)]($style) "
truncation_length = 25

[git_status]
style = "fg:#f38ba8"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "⚡"
ahead = "⬆${count}"
behind = "⬇${count}"
diverged = "⬆${ahead_count}⬇${behind_count}"
untracked = "?${count}"
stashed = "󰏗 "
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_state]
style = "bold fg:#f38ba8"
format = '\([$state($progress_current/$progress_total)]($style)\)'

# ── Languages ─────────────────────────────────────────────────────────────────
[nodejs]
symbol = " "
style = "bold fg:#a6e3a1"
format = "[$symbol($version )]($style)"
detect_files = ["package.json", ".node-version", ".nvmrc"]

[python]
symbol = " "
style = "bold fg:#f9e2af"
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[rust]
symbol = " "
style = "bold fg:#f38ba8"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "bold fg:#89dceb"
format = "[$symbol($version )]($style)"

[java]
symbol = " "
style = "bold fg:#f9e2af"
format = "[$symbol($version )]($style)"

# ── Docker & Kubernetes ───────────────────────────────────────────────────────
[docker_context]
symbol = " "
style = "bold fg:#89b4fa"
format = "[$symbol$context]($style) "
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

[kubernetes]
symbol = "󱃾 "
style = "bold fg:#89b4fa"
format = "[$symbol$context( \\($namespace\\))]($style) "
disabled = false

# ── Performance & UX ─────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000          # show duration if command took > 2s
style = "bold fg:#fab387"
format = "took [$duration]($style) "

[jobs]
symbol = "✦"
style = "bold fg:#cba6f7"
format = "[$symbol$number]($style) "
number_threshold = 2

# ── Prompt character ─────────────────────────────────────────────────────────
[status]
disabled = false
style = "bold fg:#f38ba8"
symbol = "✗ "
format = "[$symbol$common_meaning$signal_name$maybe_int]($style)"

[character]
success_symbol = "[❯](bold fg:#a6e3a1)"
error_symbol = "[❯](bold fg:#f38ba8)"
vimcmd_symbol = "[❮](bold fg:#cba6f7)"
