# =============================================================================
# .tmux.conf — Tmux configuration
# =============================================================================

# ── Terminal & Colors ─────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"  # true color support

# ── Prefix key: Ctrl+Space AND Ctrl+b both work ───────────────────────────────
set -g prefix C-Space
set -g prefix2 C-b
unbind C-b
bind C-Space send-prefix
bind C-b send-prefix -2

# ── General settings ──────────────────────────────────────────────────────────
set -g base-index 1           # windows start at 1, not 0
set -g pane-base-index 1      # panes start at 1, not 0
set -g renumber-windows on    # auto-renumber gaps when a window closes
set -g mouse on               # click panes, drag borders, scroll history
set -sg escape-time 10        # fast Esc — avoids Neovim insert-mode lag
set -g focus-events on        # lets Neovim detect focus (e.g. autoread)
set -g history-limit 50000    # large scrollback buffer
set -g display-time 2000      # messages shown for 2s
set -g status-interval 5      # refresh status bar every 5s
set -g repeat-time 1000       # longer window to keep tapping a repeatable key (e.g. resize) before needing prefix again

# ── Splitting panes ───────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Pane navigation: vim keys AND arrow keys both work ────────────────────────
# (tmux already binds prefix+Arrow to select-pane by default — this just adds hjkl too)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ── Pane resizing ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Same thing with arrow keys (plain arrows still move focus between panes —
# these need a modifier so they don't collide with that). Shift and
# Option/Alt both work — pick whichever's comfortable in the moment.
bind -r S-Up resize-pane -U 5
bind -r S-Down resize-pane -D 5
bind -r S-Left resize-pane -L 5
bind -r S-Right resize-pane -R 5

bind -r M-Up resize-pane -U 5
bind -r M-Down resize-pane -D 5
bind -r M-Left resize-pane -L 5
bind -r M-Right resize-pane -R 5

# Kept for anyone who has disabled the macOS Mission Control shortcut:
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5

# ── Copy mode (vi-style keys, arrow keys still work too) ─────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -selection clipboard"
# Ctrl+C also copies, but ONLY inside copy-mode — regular Ctrl+C (interrupting
# a running program) elsewhere is completely untouched by this.
bind -T copy-mode-vi C-c send-keys -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -selection clipboard"

# Mouse: click-drag just selects and holds the highlight — no auto-copy,
# no auto-exit. Press 'y' afterward when you actually want to copy it.
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── Paste: Ctrl+V works everywhere, no prefix needed ─────────────────────────
# Pulls straight from the system clipboard, so it also works with anything
# you copied outside tmux (browser, another app, etc.).
bind -n C-v run-shell 'tmux set-buffer -- "$(pbpaste 2>/dev/null || xclip -selection clipboard -o 2>/dev/null)"; tmux paste-buffer'

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded ✓"

# ── Status bar ────────────────────────────────────────────────────────────────
color_bg="#1e1e2e"
color_surface="#313244"
color_overlay="#45475a"
color_text="#cdd6f4"
color_subtext="#a6adc8"
color_blue="#89b4fa"
color_mauve="#cba6f7"

set -g status on
set -g status-position bottom
set -g status-style "bg=$color_bg fg=$color_text"
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[bg=$color_mauve,fg=$color_bg,bold] #S #[bg=$color_bg,fg=$color_mauve]"
set -g status-right "#{?window_zoomed_flag,#[fg=#1e1e2e bg=#f9e2af bold] 🔍 ZOOMED #[default] ,}#{prefix_highlight}#[fg=$color_subtext]#[bg=$color_surface,fg=$color_text] #h #[bg=$color_overlay,fg=$color_text] %H:%M #[bg=$color_blue,fg=$color_bg,bold] %d %b "

setw -g window-status-style "fg=$color_subtext bg=$color_bg"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=$color_bg bg=$color_blue bold"
setw -g window-status-current-format " #I:#W "

set -g pane-border-lines double
set -g pane-border-indicators both
set -g pane-border-style "fg=$color_overlay"
set -g pane-active-border-style "fg=$color_blue,bold"
set -g message-style "fg=#f9e2af bg=$color_surface bold"

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'       # persist sessions across restarts
set -g @plugin 'tmux-plugins/tmux-continuum'       # auto save/restore sessions
set -g @plugin 'tmux-plugins/tmux-yank'            # better clipboard integration
set -g @plugin 'sainnhe/tmux-fzf'                  # fzf-powered session/window/pane picker
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # shows in status bar when prefix is active

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @prefix_highlight_show_copy_mode 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
