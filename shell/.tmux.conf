# =============================================================================
# .tmux.conf — Tmux configuration
# =============================================================================

# ── Terminal & Colors ─────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"  # true color support

# ── Prefix key: Ctrl+Space AND Ctrl+b both work ───────────────────────────────
set -g prefix C-Space
set -g prefix2 C-b
unbind C-b
bind C-Space send-prefix
bind C-b send-prefix -2

# ── General settings ──────────────────────────────────────────────────────────
set -g base-index 1           # windows start at 1, not 0
set -g pane-base-index 1      # panes start at 1, not 0
set -g renumber-windows on    # auto-renumber gaps when a window closes
set -g mouse on               # click panes, drag borders, scroll history
set -sg escape-time 10        # fast Esc — avoids Neovim insert-mode lag
set -g focus-events on        # lets Neovim detect focus (e.g. autoread)
set -g history-limit 50000    # large scrollback buffer
set -g display-time 2000      # messages shown for 2s
set -g status-interval 5      # refresh status bar every 5s
set -g repeat-time 1000       # longer window to keep tapping a repeatable key (e.g. resize) before needing prefix again

# ── Splitting panes ───────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Pane navigation: vim keys AND arrow keys both work ────────────────────────
# (tmux already binds prefix+Arrow to select-pane by default — this just adds hjkl too)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ── Pane resizing ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window navigation (repeatable — tap n/p again without re-pressing prefix) ─
bind -r n next-window
bind -r p previous-window

# Digit keys jump straight to that window number, and stay repeatable — after
# one prefix press you can keep tapping 1 2 3 4 to hop between windows until
# repeat-time runs out. (Overrides tmux's default non-repeatable digit binds.)
bind -r 0 select-window -t :=0
bind -r 1 select-window -t :=1
bind -r 2 select-window -t :=2
bind -r 3 select-window -t :=3
bind -r 4 select-window -t :=4
bind -r 5 select-window -t :=5
bind -r 6 select-window -t :=6
bind -r 7 select-window -t :=7
bind -r 8 select-window -t :=8
bind -r 9 select-window -t :=9

# ── Jump to window by number: Alt+1 .. Alt+9 (no prefix needed) ──────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ── New window: Alt+T (no prefix needed) — same as prefix+c ─────────────────
bind -n M-t new-window

# ── Close pane: Alt+W (no prefix needed) — same as prefix+x ─────────────────
bind -n M-w confirm-before -p "kill-pane #P? (y/n)" kill-pane

# Same thing with arrow keys (plain arrows still move focus between panes —
# these need a modifier so they don't collide with that). Shift and
# Option/Alt both work — pick whichever's comfortable in the moment.
bind -r S-Up resize-pane -U 5
bind -r S-Down resize-pane -D 5
bind -r S-Left resize-pane -L 5
bind -r S-Right resize-pane -R 5

bind -r M-Up resize-pane -U 5
bind -r M-Down resize-pane -D 5
bind -r M-Left resize-pane -L 5
bind -r M-Right resize-pane -R 5

# Kept for anyone who has disabled the macOS Mission Control shortcut:
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5

# ── Copy mode (vi-style keys, arrow keys still work too) ─────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -selection clipboard"
# Ctrl+C also copies, but ONLY inside copy-mode — regular Ctrl+C (interrupting
# a running program) elsewhere is completely untouched by this.
bind -T copy-mode-vi C-c send-keys -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -selection clipboard"

# Mouse: click-drag just selects and holds the highlight — no auto-copy,
# no auto-exit. Press 'y' afterward when you actually want to copy it.
unbind -T copy-mode-vi MouseDragEnd1Pane

# ── Paste: Ctrl+V works everywhere, no prefix needed ─────────────────────────
# Pulls straight from the system clipboard, so it also works with anything
# you copied outside tmux (browser, another app, etc.).
bind -n C-v run-shell 'tmux set-buffer -- "$(pbpaste 2>/dev/null || xclip -selection clipboard -o 2>/dev/null)"; tmux paste-buffer'

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded ✓"

# ── Status bar ────────────────────────────────────────────────────────────────
# Gruvbox Dark palette
color_bg="#282828"      # bg0 — status bar background
color_bg1="#3c3836"     # bg1 — inactive window pill
color_bg2="#504945"     # bg2 — clock pill
color_fg="#ebdbb2"      # fg1 — main text
color_gray="#928374"
color_yellow="#fabd2f"
color_orange="#fe8019"
color_aqua="#8ec07c"
color_blue="#83a598"
color_green="#b8bb26"   # CPU pill
color_purple="#d3869b"  # RAM pill

set -g status on
set -g status-position bottom
set -g status-style "bg=$color_bg fg=$color_fg"
set -g status-left-length 40
set -g status-right-length 150

# Left: session name pill
set -g status-left "#[fg=$color_bg,bg=$color_orange,bold]  #S #[fg=$color_orange,bg=$color_bg]"

# Right: zoom flag, prefix indicator, git branch (dirty marker), clock, date —
# git segment shells out per pane (#{pane_current_path}) and falls back to
# a dash outside a repo; dirty marker is a second, independent #() call so
# neither one needs a named shell variable (tmux swallows bare $name tokens
# in double-quoted strings before the shell ever sees them).
set -g status-right "#{?window_zoomed_flag,#[fg=$color_bg,bg=$color_yellow,bold] 🔍 ZOOMED #[fg=$color_yellow,bg=$color_bg] ,}#{prefix_highlight}#[fg=$color_bg,bg=$color_green]#[fg=$color_bg,bg=$color_green,bold]  CPU #(~/.tmux-stats.sh cpu) #[fg=$color_green,bg=$color_purple]#[fg=$color_bg,bg=$color_purple,bold]  RAM #(~/.tmux-stats.sh ram) #[fg=$color_purple,bg=$color_gray]#[fg=$color_bg,bg=$color_gray,bold]  DISK #(~/.tmux-stats.sh disk) #[fg=$color_gray,bg=$color_aqua]#[fg=$color_bg,bg=$color_aqua,bold]  #(cd #{pane_current_path} 2>/dev/null; git symbolic-ref --short HEAD 2>/dev/null || git rev-parse --short HEAD 2>/dev/null || echo –)#(cd #{pane_current_path} 2>/dev/null; git status --porcelain 2>/dev/null | grep -q . && printf ' ✱') #[fg=$color_aqua,bg=$color_bg2]#[fg=$color_fg,bg=$color_bg2]  %H:%M #[fg=$color_bg2,bg=$color_blue]#[fg=$color_bg,bg=$color_blue,bold] %d %b "

# Windows: powerline pills, current window picked out in yellow.
# The #(…claude…) call paints a per-window Claude Code dot — green ● when the
# agent in that window is free (done, waiting for you), orange ⚠ when it needs
# a decision, gray ⟳ while it's working. Prints nothing for windows with no
# Claude. State is fed by claude-tmux-hook.sh via Claude Code's lifecycle hooks.
setw -g window-status-style "fg=$color_gray bg=$color_bg"
setw -g window-status-format "#[fg=$color_bg1,bg=$color_bg]#[fg=$color_fg,bg=$color_bg1] #I:#W#(~/.tmux-stats.sh claude #{window_id}) #[fg=$color_bg1,bg=$color_bg]"
setw -g window-status-current-style "fg=$color_bg bg=$color_yellow bold"
setw -g window-status-current-format "#[fg=$color_yellow,bg=$color_bg]#[fg=$color_bg,bg=$color_yellow,bold] #I:#W#(~/.tmux-stats.sh claude #{window_id}) #[fg=$color_yellow,bg=$color_bg]"

set -g pane-border-lines double
set -g pane-border-indicators both
set -g pane-border-style "fg=$color_bg1"
set -g pane-active-border-style "fg=$color_blue,bold"
set -g message-style "fg=$color_yellow bg=$color_bg1 bold"

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'       # persist sessions across restarts
set -g @plugin 'tmux-plugins/tmux-continuum'       # auto save/restore sessions
set -g @plugin 'tmux-plugins/tmux-yank'            # better clipboard integration
set -g @plugin 'sainnhe/tmux-fzf'                  # fzf-powered session/window/pane picker
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # shows in status bar when prefix is active

# Plugin settings
# Pane-content capture is off: with it on, restoring a session replays the old
# scrollback text (including stray past commands/errors) into the new pane —
# layout, cwd, and running programs still get restored either way.
set -g @resurrect-capture-pane-contents 'off'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_fg "$color_bg"
set -g @prefix_highlight_bg "$color_orange"

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
