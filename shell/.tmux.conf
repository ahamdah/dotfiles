# =============================================================================
# .tmux.conf — Tmux configuration
# =============================================================================

# ── Terminal & Colors ─────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"  # true color support

# ── Prefix key: Ctrl+a ────────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── General settings ──────────────────────────────────────────────────────────
set -g base-index 1           # windows start at 1, not 0
set -g pane-base-index 1      # panes start at 1, not 0
set -g renumber-windows on    # auto-renumber gaps when window closed
set -g mouse on               # enable mouse support
set -sg escape-time 10        # faster key sequences (important for nvim)
set -g focus-events on        # pass focus events (for nvim autoread)
set -g history-limit 50000    # larger scrollback buffer
set -g display-time 2000      # messages shown for 2s
set -g status-interval 5      # refresh status every 5s

# ── Splitting panes ───────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ───────────────────────────────────────────────
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ── Pane resizing ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window navigation ─────────────────────────────────────────────────────────
bind -r m previous-window
bind -r n next-window
bind -r Tab last-window        # quick jump to last active window

# ── Copy mode (vi-style) ─────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -selection clipboard"
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded ✓"

# ── Status bar ────────────────────────────────────────────────────────────────
# Catppuccin Mocha-inspired color palette
color_bg="#1e1e2e"
color_surface="#313244"
color_overlay="#45475a"
color_text="#cdd6f4"
color_subtext="#a6adc8"
color_blue="#89b4fa"
color_mauve="#cba6f7"
color_green="#a6e3a1"
color_yellow="#f9e2af"
color_red="#f38ba8"
color_teal="#94e2d5"

set -g status on
set -g status-position bottom
set -g status-style "bg=$color_bg fg=$color_text"
set -g status-left-length 40
set -g status-right-length 80

# Left: session name
set -g status-left "#[bg=$color_mauve,fg=$color_bg,bold] 󰊠 #S #[bg=$color_bg,fg=$color_mauve]"

# Right: git branch (if in git repo), host, time
set -g status-right "\
#[fg=$color_subtext]#[bg=$color_surface,fg=$color_text] 󰒋 #h \
#[bg=$color_overlay,fg=$color_text] 󰃰 %H:%M \
#[bg=$color_blue,fg=$color_bg,bold] %d %b "

# Window status
setw -g window-status-style "fg=$color_subtext bg=$color_bg"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=$color_bg bg=$color_blue bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=$color_overlay"
set -g pane-active-border-style "fg=$color_blue"

# Messages
set -g message-style "fg=$color_yellow bg=$color_surface bold"

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'     # persist sessions across restarts
set -g @plugin 'tmux-plugins/tmux-continuum'     # auto save/restore sessions
set -g @plugin 'tmux-plugins/tmux-yank'          # better clipboard integration

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
